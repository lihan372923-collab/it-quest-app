<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
  <meta name="theme-color" content="#101827"/>
  <title>技术成长与工作助手</title>
  <script>
    (function(){
      var t = localStorage.getItem('work_theme') || 'system';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="manifest" href="manifest.json"/>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js')</script>
  <link rel="stylesheet" href="style.css?v=work-logic2"/>
</head>
<body>
<div id="app">
  <section class="page active" id="home">
    <header class="top">
      <div><span class="sub">TECH QUEST</span><h1>技术成长助手</h1></div>
      <button class="circle" onclick="openModal('settings')">⚙</button>
    </header>
    <article class="hero">
      <div class="hero-bg"></div>
      <span class="sub">当前职业</span>
      <h2 id="roleName">技术学徒</h2>
      <p id="progressText">已完成 0 关</p>
      <div class="bar"><i id="progressBar"></i></div>
      <button id="continueBtn">继续闯关</button>
    </article>
    <div class="title"><h3>职业地图</h3><button onclick="nav('learn')">全部</button></div>
    <div class="scroll" id="worldStrip"></div>
    <div class="title"><h3>工作高频问题</h3><button onclick="nav('work')">更多</button></div>
    <div class="quick-grid" id="hotProblems"></div>
    <div class="title"><h3>Boss 副本</h3></div>
    <div class="cards" id="bossPreview"></div>
  </section>

  <section class="page" id="learn">
    <header class="top"><h1>学习地图</h1><button class="circle" onclick="openModal('search')">⌕</button></header>
    <div class="world-tabs" id="worldTabs"></div>
    <div class="path" id="lessonPath"></div>
  </section>

  <section class="page" id="work">
    <header class="top"><h1>实战问题</h1><button class="circle" onclick="openModal('search')">⌕</button></header>
    <div class="filters" id="problemFilters"></div>
    <div class="cards" id="problemList"></div>
  </section>

  <section class="page" id="tools">
    <header class="top"><h1>工具箱</h1><button class="circle" onclick="openModal('search')">⌕</button></header>
    <div class="seg"><button class="active" data-tool="cmd">命令</button><button data-tool="boss">副本</button><button data-tool="calc">计算器</button></div>
    <div id="toolContent" class="cards"></div>
  </section>

  <section class="page" id="me">
    <header class="top"><h1>我的角色</h1><button class="circle" onclick="openModal('settings')">⚙</button></header>
    <div class="stats">
      <div><b id="doneCount">0</b><span>完成关卡</span></div>
      <div><b id="xpCount">0</b><span>XP</span></div>
      <div><b id="favCount">0</b><span>收藏</span></div>
    </div>
    <div class="title"><h3>成就</h3></div>
    <div class="cards" id="achievements"></div>
  </section>

  <section class="modal" id="lessonModal">
    <header class="modalTop"><button onclick="closeModal()">‹</button><div><span class="sub" id="lessonMeta">关卡</span><h2 id="lessonTitle">标题</h2></div></header>
    <main id="lessonBody"></main>
  </section>

  <section class="modal" id="problemModal">
    <header class="modalTop"><button onclick="closeModal()">‹</button><div><span class="sub" id="problemCat">问题</span><h2 id="problemTitle">标题</h2></div></header>
    <main id="problemBody"></main>
  </section>

  <section class="modal" id="search">
    <header class="modalTop"><button onclick="closeModal()">‹</button><input id="searchInput" class="search" placeholder="搜索 摄像头离线 / 装系统 / nginx"/></header>
    <div class="cards" id="searchResult"></div>
  </section>

  <section class="modal" id="settings">
    <header class="modalTop"><button onclick="closeModal()">‹</button><h2>设置</h2></header>
    <div class="cards">
      <article class="card">
        <h3>显示模式</h3>
        <p>可跟随手机系统，也可以手动固定白天/黑夜。</p>
        <div class="theme-options">
          <button data-theme-choice="system">跟随系统</button>
          <button data-theme-choice="light">白天</button>
          <button data-theme-choice="dark">黑夜</button>
        </div>
      </article>
      <article class="card"><h3>导出课程数据</h3><p>以后可以继续扩充内容。</p><button onclick="downloadData()">导出 JSON</button></article>
      <article class="card"><h3>导出学习进度</h3><p>换手机前备份。</p><button onclick="downloadProgress()">导出进度</button></article>
      <article class="card danger"><h3>重置本机数据</h3><button id="resetBtn">清空进度</button></article>
    </div>
  </section>

  <nav class="tabbar">
    <button class="active" data-page="home"><span>🏠</span>首页</button>
    <button data-page="learn"><span>🗺️</span>学习</button>
    <button data-page="work"><span>🧰</span>实战</button>
    <button data-page="tools"><span>⚙️</span>工具</button>
    <button data-page="me"><span>🎮</span>我的</button>
  </nav>
</div>
<script src="data.js?v=work-logic2"></script>
<script src="app.js?v=work-logic2"></script>
</body>
</html>
